<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="ball" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#2a1045"/>
      <stop offset="100%" stop-color="#0d001a"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="#0d001a"/>
  <circle cx="256" cy="256" r="180" fill="url(#ball)" stroke="#ff00cc" stroke-width="4" filter="url(#glow)"/>
  <text x="256" y="290" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="180" font-weight="900" fill="#ff00cc" filter="url(#glow)">8</text>
</svg>